kind = "video"
previewPath = "/"
title = "Motivational Reel Engine"
version = "1.0.0"
id = "artifacts/motivational-reel"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26065

[services.development]
run = "pnpm --filter @workspace/motivational-reel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/motivational-reel", "run", "build" ]
publicDir = "artifacts/motivational-reel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26065"
BASE_PATH = "/"
